<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile · TaxEase India</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="app-layout">

  <aside class="sidebar" id="app-sidebar"></aside>

  <main class="main-content">
    <header class="page-header flex-between">
      <div>
        <h1>My Profile</h1>
        <p>Personal and permanent account details</p>
      </div>
      <button class="btn btn-primary" id="save-btn-top" onclick="saveProfile()">💾 Save Profile</button>
    </header>

    <div class="page-body" id="loading-container">
      <div class="loading-overlay">
        <div class="spinner spinner-lg"></div>
        <p>Loading profile...</p>
      </div>
    </div>

    <div class="page-body hidden" id="form-container">
      <div id="alert-container"></div>
      
      <div class="card">
        <div class="card-header"><span class="card-title">Personal Details</span></div>
        <div class="card-body">
            <form id="profile-form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">PAN Number</label>
                        <input type="text" class="form-input" id="pan" placeholder="ABCDE1234F" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Aadhaar Number</label>
                        <input type="text" class="form-input" id="aadhaar" placeholder="1234 5678 9012">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-input" id="dateOfBirth">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mobile Number</label>
                        <input type="tel" class="form-input" id="mobile" placeholder="9876543210">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Residential Status</label>
                        <select class="form-select" id="residentialStatus">
                            <option value="RESIDENT">Resident</option>
                            <option value="NON_RESIDENT">Non-Resident (NRI)</option>
                            <option value="NOT_ORDINARILY_RESIDENT">Not Ordinarily Resident</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Age Category</label>
                        <select class="form-select" id="ageCategory">
                            <option value="BELOW_60">Below 60 Years</option>
                            <option value="SENIOR_60_80">Senior Citizen (60-79 Years)</option>
                            <option value="SUPER_SENIOR">Super Senior (80+ Years)</option>
                        </select>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-input" id="address">
                    </div>
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" class="form-input" id="city">
                    </div>
                    <div class="form-group">
                        <label class="form-label">State</label>
                        <input type="text" class="form-input" id="state">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pincode</label>
                        <input type="text" class="form-input" id="pincode">
                    </div>
                </div>
            </form>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/app-shell.js"></script>
  <script>
    const fields = ['pan', 'aadhaar', 'dateOfBirth', 'mobile', 'address', 'city', 'state', 'pincode', 'residentialStatus', 'ageCategory'];

    async function loadData() {
      if (!await initAppShell('profile')) return;

      try {
        const profile = await ClientAPI.getProfile();
        
        fields.forEach(f => {
            const el = document.getElementById(f);
            if (el && profile[f]) el.value = profile[f];
        });

        document.getElementById('loading-container').classList.add('hidden');
        document.getElementById('form-container').classList.remove('hidden');

      } catch (err) {
        showToast('Error loading profile', 'error');
      }
    }

    async function saveProfile() {
      const payload = {};
      fields.forEach(f => {
          const el = document.getElementById(f);
          if (el) payload[f] = el.value || null;
      });

      const btn = document.getElementById('save-btn-top');
      setLoading(btn, true, 'Saving...');

      try {
        await ClientAPI.updateProfile(payload);
        showToast('Profile updated successfully!', 'success');
      } catch (err) {
        document.getElementById('alert-container').innerHTML = `
          <div class="alert alert-error">
             <span class="alert-icon">❌</span>
             <span>Failed to save: ${err.message}</span>
          </div>`;
      } finally {
        setLoading(btn, false);
      }
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
